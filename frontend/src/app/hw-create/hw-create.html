
<div class="create-shell">
  <div class="create-header">
    <button class="home-btn" (click)="goHome()">Home 🏠</button>
    <div>
      <p class="eyebrow">New Task</p>
      <h2>Add homework in one flow</h2>
    </div>
  </div>
  

  <div class="create-card">
    <form [formGroup]="hwForm" (ngSubmit)="createHw()">
      <div class="form-grid">
        <div class="field-group">
          <label for="date">Date</label>
          <input type="date" id="date" class="form-control" formControlName="date" required>
        </div>

        <div class="field-group">
          <label for="subject">Subject</label>
          <div class="subject-group">
            <input type="text" id="subject" class="form-control" formControlName="subject" required>
            <button type="button" class="icon-button" (click)="toggleEmojiPicker()">😊</button>
          </div>
        </div>

        <div class="field-group">
          <label for="task_type">Task type</label>
          <select id="task_type" class="form-control" formControlName="task_type">
            <option value="" disabled selected>Select task type</option>
            <option value="Homework">Homework</option>
            <option value="Project">Project</option>
            <option value="Exam">Exam</option>
            <option value="Quiz">Quiz</option>
            <option value="Study">Study</option>
            <option value="Practice">Practice</option>
            <option value="Presentation">Presentation</option>
          </select>
        </div>

        <div class="field-group full-width">
          <label for="notes">Notes</label>
          <input type="text" id="notes" class="form-control" formControlName="notes">
        </div>
      </div>

      <div *ngIf="showEmojiPicker" class="emoji-picker">
        <button type="button" class="emoji-button" *ngFor="let emoji of emojis" (click)="addEmojiToSubject(emoji)">
          {{ emoji }}
        </button>
      </div>

      <button type="submit" class="primary-button" [disabled]="hwForm.invalid">Add task</button>
    </form>
  </div>
</div>
