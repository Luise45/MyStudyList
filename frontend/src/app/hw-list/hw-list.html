<div class="hw-shell">
  <header class="hw-header">
    <div class="header-title">
      <button class="home-btn" (click)="goHome()">Home 🏠</button>
      <div>
        <p class="eyebrow">Homework Planner</p>
        <h2>Organize your tasks with clarity</h2>
      </div>
    </div>

    <div class="header-actions">
      <div class="search-box">
        <label for="inputsearch" class="sr-only">Search</label>
        <input
          id="inputsearch"
          type="search"
          class="search-input"
          (input)="filterHw(filter.value)"
          placeholder="Search by date or subject"
          #filter
        />
      </div>

      <a routerLink="/hws/create" class="primary-button small">+ Add task</a>
    </div>
  </header>

  <section class="list-card">
    <div class="list-card-header">
      <div>
        <p class="eyebrow">To-do list</p>
        <h3>Keep every deadline visible</h3>
      </div>
      <button class="secondary-button" (click)="toggleSort()" title="Sort by date">
        Sort {{ sortDirection === 'asc' ? '⬆️' : '⬇️' }}
      </button>
    </div>

    <table class="task-table" *ngIf="hws.length > 0">
      <thead>
        <tr>
          <th>Due date</th>
          <th>Subject</th>
          <th>Task type</th>
          <th>Notes</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let hw of filteredHws">
          <td>{{ hw.date | date:'yyyy-MM-dd' }}</td>
          <td>{{ hw.subject }}</td>
          <td>{{ hw.task_type }}</td>
          <td>{{ hw.notes }}</td>
          <td>
            <button
              class="action-btn"
              (click)="deleteHw(hw._id)"
              title="Delete"
            >
              ✔️
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <p *ngIf="filteredHws.length === 0" class="empty-state">Nothing here yet. Add a task to get started.</p>
  </section>

  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
    <div
      class="toast align-items-center text-black border-0"
      id="deleteToast"
      role="alert"
      aria-live="assertive"
      aria-atomic="true"
      style="background-color: #e8edef; font-size: 1.2rem;"
    >
      <div class="d-flex">
        <div class="toast-body">Good job 🎉!</div>
        <button type="button" class="btn-close btn-close-black me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>
</div>
